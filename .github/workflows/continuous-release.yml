name: Continuous Preview Release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

# Cancel in-progress runs of this workflow if a new commit is pushed
concurrency:
  group: continuous-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-release:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history for Turbo diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pin & bootstrap pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1

      - name: Install dependencies
        run: pnpm install

      - name: Fetch upstream for diffing
        run: |
          git remote add upstream https://github.com/reatom/reatom.git || true
          git fetch upstream ${{ github.base_ref }} --depth=50

      - name: Get changed workspace directories
        id: changed
        run: |
          set -euo pipefail
          # Ask Turbo which packages changed vs upstream/<base> & include dependents
          npx turbo run build --filter=...[upstream/${{ github.base_ref }}...HEAD] --dry=json \
            | jq -r '.tasks[].directory' \
            | sort -u >changed-dirs.txt

          if [ ! -s changed-dirs.txt ]; then
            echo "paths=" >>"$GITHUB_OUTPUT"
            echo "No changed packages."
          else
            # Prefix each with ./ for pkg-pr-new
            CHANGED_PATHS=$(sed -e 's|^|./|' changed-dirs.txt | xargs)
            echo "paths=$CHANGED_PATHS" >>"$GITHUB_OUTPUT"
            echo "Changed paths: $CHANGED_PATHS"
          fi

      - name: Build changed + dependents
        if: steps.changed.outputs.paths != ''
        run: npx turbo run build --filter=...[upstream/${{ github.base_ref }}...HEAD]

      - name: Publish changed packages
        if: steps.changed.outputs.paths != ''
        run: pnpm dlx pkg-pr-new publish ${{ steps.changed.outputs.paths }}

      # - name: Build changed packages
      #   run: npx turbo run build --filter=[upstream/${{ github.base_ref }}]

      # - name: Publish packages
      # run: pnpm dlx pkg-pr-new publish './packages/*' --packageManager=pnpm --no-template
